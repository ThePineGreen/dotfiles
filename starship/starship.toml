# ~/.config/starship.toml

add_newline = false
command_timeout = 100
# format = """
# $os$username$hostname$nodejs$directory$git_branch$git_status
# [ ](bold)
# """

format = """
$os$username$hostname$directory\
$fill\
$nodejs$git_branch$git_status
$character
"""

# right_format = "$nodejs$git_branch$git_status"

# Drop ugly default prompt characters
[character]
success_symbol = '[](bold green)'
error_symbol = '[](bold red)'

# ---

[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = ''
Arch = '󰣇'
Ubuntu = ''
Macos = '󰀵'
CachyOS = '󰣇'

# ---

# Shows the username
[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = true
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false

# Shows current directory
[directory]
truncation_length = 1
truncation_symbol = '…/'
home_symbol = '󰋜 ~'
read_only_style = '197'
read_only = '  '
format = 'at [$path]($style)[$read_only]($read_only_style) '

[directory.substitutions]
"Documents" = "󰈙 "
"Developer" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# Shows current git branch
[git_branch]
symbol = ' '
format = 'on [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = '…/'
style = 'bold green'

# Shows current git status
[git_status]
format = '([ \( $all_status$ahead_behind\)]($style) )'
style = 'bold green'
conflicted = '[ confliced=${count}](red) '
up_to_date = '[󰘽](green) '
untracked = '[󰋗 ${count}](red) '
ahead = ' ahead=${count}'
diverged = ' ahead=${ahead_count}  behind=${behind_count}'
behind = ' behind=${count}'
stashed = '[ stashed=${count}](green) '
modified = '[󰛿 ${count}](yellow) '
staged = '[󰐗 ${count}](green) '
renamed = '[󱍸 ${count}](yellow) '
deleted = '[󰍶 ${count}](red) '

# ---

[vagrant]
disabled = true

[docker_context]
disabled = true

[helm]
disabled = true

[python]
disabled = false

[nodejs]

disabled = false

[ruby]
disabled = true

[terraform]
disabled = true
